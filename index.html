<script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbyIKcMVAhZrdK-lBYnlppnY0HAVNYoVmsBMBXH49uJfMbwRkkrEGbO2Fr8BHpoqastqxg/exec'; 
   
    let startTime = null;

    function show(id) {
        document.querySelectorAll('.container > div').forEach(div => div.style.display = 'none');
        document.getElementById(id).style.display = id === 'loading-container' ? 'flex' : 'block';
    }

    function goToLoading() {
        const gender = document.querySelector('input[name="gender"]:checked');
        const age = document.getElementById('age').value;
        const education = document.getElementById('education').value;

        if (!gender) { alert('Wybierz płeć'); return; }
        if (!age || age < 1) { alert('Podaj poprawny wiek'); return; }
        if (!education) { alert('Wybierz wykształcenie'); return; }

        const data = {
            gender: gender.value,
            age: parseInt(age),
            education: education
        };
        localStorage.setItem('tempData', JSON.stringify(data));

        startTime = Date.now();
        localStorage.setItem('startTime', startTime);
        localStorage.setItem('isInLoading', 'true');

        show('loading-container');
    }

    function showThankYou() {
        localStorage.setItem('surveyCompleted', 'true');
        show('thank-container');
    }

    window.onload = function() {
        if (localStorage.getItem('surveyCompleted') === 'true') {
            showThankYou();
            return;
        }
        show('form-container');
    };

    // NOWA WERSJA – działa o wiele lepiej
    window.addEventListener('beforeunload', function() {
        if (localStorage.getItem('isInLoading') !== 'true') return;

        const start = parseInt(localStorage.getItem('startTime'));
        if (!start) return;

        const timeSpent = Math.floor((Date.now() - start) / 1000);

        const tempDataStr = localStorage.getItem('tempData');
        if (!tempDataStr) return;

        let payload = JSON.parse(tempDataStr);
        payload.time_seconds = timeSpent;
        payload.timestamp = new Date().toISOString();

        console.log('🟡 Wysyłam dane do arkusza...', payload);   // ← zobaczysz to w konsoli

        fetch(APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            keepalive: true
        })
        .then(response => {
            console.log('✅ Sukces! Status:', response.status);
            if (response.ok) {
                console.log('Dane zapisane w arkuszu');
            }
        })
        .catch(err => {
            console.error('❌ Błąd wysyłania:', err);
            alert('Błąd zapisu – zrób screen konsoli i pokaż mi');
        });

        localStorage.setItem('surveyCompleted', 'true');
    });
</script>
